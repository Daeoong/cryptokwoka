<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Kwoka</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
    position: relative;
}

/* Размытый фон */
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('back.png') center/cover no-repeat;
    filter: blur(6px);
    z-index: -1;
}

/* Центральная секция */
.main-section {
    position: relative;
    z-index: 5;
}

/* ===== КАРУСЕЛИ ===== */
.carousel-container {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 120px;
    overflow: hidden;
    z-index: 2;
    pointer-events: none;
}

.carousel-left {
    left: calc(50% - 400px/2 - 130px);
}

.carousel-right {
    left: calc(50% + 400px/2 + 130px);
}

.carousel-track {
    display: flex;
    flex-direction: column;
    gap: 30px;
    will-change: transform;
}

.carousel-track img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 10px;
    flex-shrink: 0;

    /* ✨ НЕОНОВЫЙ GLOW */
    box-shadow: 
        0 0 8px rgba(255, 200, 0, 0.4),
        0 0 15px rgba(255, 200, 0, 0.3);

    transition: 0.3s;
}

/* 🔥 hover эффект */
.carousel-track img:hover {
    transform: scale(1.1);
    box-shadow:
        0 0 10px #ffd700,
        0 0 20px #ffcc00,
        0 0 40px rgba(255, 200, 0, 0.7);
}

/* Анимация */
.scroll-up {
    animation: scrollUp 9s linear infinite;
}

.scroll-down {
    animation: scrollDown 9s linear infinite;
}

@keyframes scrollUp {
    0% { transform: translateY(0); }
    100% { transform: translateY(-33.333%); }
}

@keyframes scrollDown {
    0% { transform: translateY(-33.333%); }
    100% { transform: translateY(0); }
}

/* ===== ЦЕНТРАЛЬНАЯ КАРТИНКА ===== */
.main-image {
    width: 400px;
    cursor: pointer;
    position: relative;
    top: 60px;
    z-index: 10;
    left: 45px;

    /* 🌊 ПЛАВАЮЩАЯ АНИМАЦИЯ */
    animation: float 3s ease-in-out infinite;

    /* ✨ НЕОН */
    box-shadow:
        0 0 15px rgba(255, 200, 0, 0.5),
        0 0 30px rgba(255, 200, 0, 0.4);

    border-radius: 20px;

    transition: transform 0.1s linear;
}

/* плавание */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0px); }
}

/* прыжок */
.jump {
    animation: jumpAnim 0.5s;
}

@keyframes jumpAnim {
    0% { transform: translateY(0); }
    25% { transform: translateY(-30px); }
    50% { transform: translateY(0); }
    75% { transform: translateY(-20px); }
    100% { transform: translateY(0); }
}

/* ===== КНОПКИ ===== */
.buttons-vertical {
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: fixed;
    left: 20px;
    bottom: 40px;
    z-index: 10;
}

.buttons-vertical img {
    width: 60px;
    border-radius: 50%;

    /* ✨ glow */
    box-shadow: 0 0 10px rgba(255, 200, 0, 0.5);

    transition: 0.3s;
}

.buttons-vertical img:hover {
    transform: scale(1.2);
    box-shadow:
        0 0 10px #ffd700,
        0 0 25px #ffcc00,
        0 0 40px rgba(255, 200, 0, 0.8);
}

/* Футер */
.footer {
    background-color: black;
    color: white;
    padding: 10px;
    position: fixed;
    bottom: 0;
    width: 100%;
    z-index: 10;
}

/* 📱 МОБИЛКА */
@media (max-width: 768px) {

    .carousel-container {
        display: none;
    }

    .main-image {
        width: 260px;
        left: 50%;
        transform: translateX(-50%);
        top: 80px;
    }

    .buttons-vertical {
        flex-direction: row;
        left: 50%;
        transform: translateX(-50%);
        bottom: 20px;
    }

    .buttons-vertical img {
        width: 50px;
    }
}
</style>
</head>

<body>

<!-- Кнопки -->
<div class="buttons-vertical">
    <a href="https://dexscreener.com/" target="_blank"><img src="dexscreener.png"></a>
    <a href="https://pump.fun/" target="_blank"><img src="pumpfun.png"></a>
    <a href="https://x.com/" target="_blank"><img src="X.png"></a>
</div>

<!-- Левая -->
<div class="carousel-container carousel-left">
    <div class="carousel-track scroll-up">
        <img src="1.png"><img src="2.png"><img src="3.png">
        <img src="1.png"><img src="2.png"><img src="3.png">
        <img src="1.png"><img src="2.png"><img src="3.png">
    </div>
</div>

<!-- Правая -->
<div class="carousel-container carousel-right">
    <div class="carousel-track scroll-down">
        <img src="4.png"><img src="5.png"><img src="6.png">
        <img src="4.png"><img src="5.png"><img src="6.png">
        <img src="4.png"><img src="5.png"><img src="6.png">
    </div>
</div>

<!-- Центр -->
<div class="main-section">
    <img class="main-image" src="central.png" id="mainImg">
</div>

<div class="footer">
    Адрес: ул. Примерная, 1 | Контакты: +7 999 123-45-67
</div>

<script>
const mainImg = document.getElementById('mainImg');
const clownSound = new Audio('Vocaroo 1gSPeruSh5GL.mp3');
clownSound.volume = 0.7;

mainImg.addEventListener('click', () => {
    mainImg.classList.add('jump');
    clownSound.currentTime = 0;
    clownSound.play().catch(()=>{});
    setTimeout(() => mainImg.classList.remove('jump'), 500);
});

/* параллакс только на ПК */
if (window.innerWidth > 768) {
    const main = document.querySelector(".main-image");
    const left = document.querySelector(".carousel-left");
    const right = document.querySelector(".carousel-right");

    document.addEventListener("mousemove", (e) => {
        const x = (e.clientX / window.innerWidth - 0.5);
        const y = (e.clientY / window.innerHeight - 0.5);

        main.style.transform = `translate(${x * 30}px, ${y * 30}px)`;
        left.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
        right.style.transform = `translate(${x * 20}px, ${y * 20}px)`;

        document.body.style.backgroundPosition = `${50 + x * 5}% ${50 + y * 5}%`;
    });
}
</script>

</body>
</html>
