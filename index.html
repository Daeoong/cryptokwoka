 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crypto Kwoka</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background-color: #f0f0f0;
            overflow: hidden;
        }

        .main-section {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: 80px;
            gap: 50px;
        }

        /* Карусели */
        .carousel-container {
            position: relative;
            width: 120px;
            height: 650px;
            overflow: hidden;
        }

        .carousel {
            display: flex;
            flex-direction: column;
        }

        .carousel-track {
            display: flex;
            flex-direction: column;
        }

        .carousel img {
            width: 100px; 
            border-radius: 10px;
            margin: 15px 0;
        }

        /* ПЛАВНАЯ БЕСКОНЕЧНАЯ АНИМАЦИЯ */
        .scroll-up {
            animation: scrollUp 10s linear infinite;
        }

        .scroll-down {
            animation: scrollDown 10s linear infinite;
        }

        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        @keyframes scrollDown {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(0); }
        }

        /* Центральная картинка */
        .main-image {
            width: 400px;
            cursor: pointer;
        }

        .jump {
            animation: jumpAnim 0.5s;
        }

        @keyframes jumpAnim {
            0% { transform: translateY(0); }
            25% { transform: translateY(-30px); }
            50% { transform: translateY(0); }
            75% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }

        /* Кнопки */
        .buttons-vertical {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: absolute;
            left: 20px;       
            bottom: 50px;     
        }

        .buttons-vertical img {
            width: 60px;
            border-radius: 50%;
            transition: 0.3s;
        }

        .buttons-vertical img:hover {
            transform: scale(1.2);
            box-shadow: 0px 6px 15px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        /* Подвал */
        .footer {
            background-color: black;
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 10;
        }
    </style>
</head>
<body>

<!-- Кнопки -->
<div class="buttons-vertical">
    <a href="https://dexscreener.com/" target="_blank">
        <img src="dexscreener.png">
    </a>
    <a href="https://pump.fun/" target="_blank">
        <img src="pumpfun.png">
    </a>
    <a href="https://x.com/" target="_blank">
        <img src="X.png">
    </a>
</div>

<div class="main-section">

    <!-- Левая карусель (вверх) -->
    <div class="carousel-container">
        <div class="carousel-track scroll-up">
            <!-- набор -->
            <img src="1.png">
            <img src="2.png">
            <img src="3.png">

            <!-- дубликат -->
            <img src="1.png">
            <img src="2.png">
            <img src="3.png">
        </div>
    </div>

    <!-- Центр -->
    <img class="main-image" src="central.png" id="mainImg">

    <!-- Правая карусель (вниз) -->
    <div class="carousel-container">
        <div class="carousel-track scroll-down">
            <!-- набор -->
            <img src="4.png">
            <img src="5.png">
            <img src="6.png">

            <!-- дубликат -->
            <img src="4.png">
            <img src="5.png">
            <img src="6.png">
        </div>
    </div>

</div>

<div class="footer">
    Адрес: ул. Примерная, 1 | Контакты: +7 999 123-45-67
</div>

<script>
const mainImg = document.getElementById('mainImg');
 const clownSound = new Audio('Vocaroo 1gSPeruSh5GL.mp3');
clownSound.volume = 0.7;

mainImg.addEventListener('click', () => {
    mainImg.classList.add('jump');
    clownSound.currentTime = 0;
    clownSound.play().catch(()=>{});
    setTimeout(() => mainImg.classList.remove('jump'), 500);
});
</script>

</body>
</html>
